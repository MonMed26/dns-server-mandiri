version: '3.8'

services:
  dns-server:
    build: .
    container_name: dns-server-mandiri
    restart: unless-stopped
    ports:
      - "53:53/udp"
      - "53:53/tcp"
      - "9153:9153/tcp"  # Metrics
    volumes:
      - ./config.yaml:/etc/dns-server/config.yaml:ro
    environment:
      - TZ=Asia/Jakarta
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '2'
        reservations:
          memory: 256M
          cpus: '0.5'
    cap_add:
      - NET_BIND_SERVICE
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9153/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
