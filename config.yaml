# DNS Server Mandiri - Configuration
# Optimized for 300+ hotspot users behind Mikrotik

server:
  listen_addr: "0.0.0.0"
  udp_port: 53
  tcp_port: 53
  workers: 4

cache:
  max_size: 500000
  default_ttl: 5m
  min_ttl: 30s
  max_ttl: 24h
  negative_ttl: 5m
  prefetch_ratio: 0.1
  cleanup_interval: 1m

resolver:
  max_depth: 30
  max_cname_chain: 10
  timeout: 2s
  retries: 3
  root_hints_file: ""
  enable_dnssec: false

rate:
  enabled: true
  requests_per_sec: 100
  burst_size: 200
  cleanup_interval: 5m

metrics:
  enabled: true
  listen_addr: "0.0.0.0"
  port: 9153

logging:
  level: "info"
  file: ""
  query_log: false

# === NEW FEATURES ===

# DNS Filtering (Ad/Malware blocking - like Pi-hole)
# Blocklist sources are managed via dashboard GUI
filter:
  enabled: true
  blocklist_dir: "/var/lib/dns-server/blocklists"
  sources: []  # Add via dashboard Settings tab
  whitelist_file: ""
  blacklist_file: ""
  update_interval: 24h
  block_response: "zero"  # "zero" (0.0.0.0), "nxdomain", "refused"

# Failover to upstream DNS (fallback if recursive fails)
failover:
  enabled: true
  upstreams:
    - "8.8.8.8"
    - "1.1.1.1"
    - "9.9.9.9"
  timeout: 3s
  max_retries: 2

# Cache persistence (survive restart)
persistence:
  enabled: true
  file_path: "/var/lib/dns-server/cache.gob"
  save_interval: 5m

# Custom local DNS records
local_records:
  enabled: true
  records:
    # Example: captive portal
    # - name: "login.hotspot.local"
    #   type: "A"
    #   value: "192.168.20.1"
    #   ttl: 300
    # Example: internal server
    # - name: "server.local"
    #   type: "A"
    #   value: "192.168.20.196"
    #   ttl: 300

# Per-client statistics
client_stats:
  enabled: true
  max_clients: 10000

# EDNS Client Subnet (helps CDNs return closer servers)
ecs:
  enabled: true
  subnet_ipv4: 24
  subnet_ipv6: 56
