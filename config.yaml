# DNS Server Mandiri - Configuration
# Optimized for 300+ hotspot users behind Mikrotik

server:
  listen_addr: "0.0.0.0"
  udp_port: 53
  tcp_port: 53
  workers: 4

cache:
  max_size: 500000
  default_ttl: 5m
  min_ttl: 30s
  max_ttl: 24h
  negative_ttl: 5m
  prefetch_ratio: 0.1
  cleanup_interval: 1m

resolver:
  max_depth: 30
  max_cname_chain: 10
  timeout: 2s
  retries: 3
  root_hints_file: ""
  enable_dnssec: false

rate:
  enabled: true
  requests_per_sec: 100
  burst_size: 200
  cleanup_interval: 5m

metrics:
  enabled: true
  listen_addr: "0.0.0.0"
  port: 9153

logging:
  level: "info"
  file: ""
  query_log: false

# === NEW FEATURES ===

# DNS Filtering (Ad/Malware blocking - like Pi-hole)
# Sources can be managed via dashboard Settings tab
filter:
  enabled: true
  blocklist_dir: "/var/lib/dns-server/blocklists"
  sources:
    - "https://raw.githubusercontent.com/StevenBlack/hosts/master/hosts"
    - "https://adaway.org/hosts.txt"
    - "https://pgl.yoyo.org/adservers/serverlist.php?hostformat=hosts&showintro=0"
  whitelist_file: ""
  blacklist_file: ""
  update_interval: 24h
  block_response: "zero"  # "zero" (0.0.0.0), "nxdomain", "refused"

# Failover to upstream DNS (fallback if recursive fails)
failover:
  enabled: true
  upstreams:
    - "8.8.8.8"
    - "1.1.1.1"
    - "9.9.9.9"
  timeout: 3s
  max_retries: 2

# Cache persistence (survive restart)
persistence:
  enabled: true
  file_path: "/var/lib/dns-server/cache.gob"
  save_interval: 5m

# Custom local DNS records
local_records:
  enabled: true
  records:
    # Example: captive portal
    # - name: "login.hotspot.local"
    #   type: "A"
    #   value: "192.168.20.1"
    #   ttl: 300
    # Example: internal server
    # - name: "server.local"
    #   type: "A"
    #   value: "192.168.20.196"
    #   ttl: 300

# Per-client statistics
client_stats:
  enabled: true
  max_clients: 10000

# EDNS Client Subnet (helps CDNs return closer servers)
ecs:
  enabled: true
  subnet_ipv4: 24
  subnet_ipv6: 56

# Dashboard authentication (Basic Auth)
# Enable this to protect the dashboard from unauthorized access
dashboard_auth:
  enabled: false
  username: "admin"
  password: "admin"  # Change this in production!

# Cache warm-up (pre-resolve popular domains on startup)
# Reduces latency spike after restart for 300+ hotspot users
cache_warmup:
  enabled: true
  domains:
    - "google.com"
    - "www.google.com"
    - "youtube.com"
    - "www.youtube.com"
    - "facebook.com"
    - "www.facebook.com"
    - "instagram.com"
    - "www.instagram.com"
    - "tiktok.com"
    - "www.tiktok.com"
    - "whatsapp.com"
    - "web.whatsapp.com"
    - "twitter.com"
    - "x.com"
    - "github.com"
    - "cloudflare.com"
    - "tokopedia.com"
    - "shopee.co.id"
    - "bukalapak.com"
    - "gojek.com"
    - "grab.com"
    - "dana.id"
    - "ovo.id"
    - "bca.co.id"
    - "detik.com"
    - "kompas.com"
    - "tribunnews.com"
    - "liputan6.com"
