# AdGuard Home Configuration Template
# For use with DNS Server Mandiri as upstream recursive resolver
# Place this file at: /opt/AdGuardHome/AdGuardHome.yaml

bind_host: 0.0.0.0
bind_port: 3000  # Web UI port (change to 80 if you want)

# Admin credentials (change via web UI after first login)
users:
  - name: admin
    password: $2a$10$changeme  # Will be set during web UI setup

auth_attempts: 5
block_auth_min: 15
http_proxy: ""
language: ""
theme: auto

# ==================== DNS Configuration ====================
dns:
  # Listen on all interfaces, port 53
  bind_hosts:
    - 0.0.0.0
  port: 53
  
  # No rate limiting (DNS Server Mandiri handles this)
  ratelimit: 0
  ratelimit_subnet_len_ipv4: 24
  ratelimit_subnet_len_ipv6: 56
  
  # Refuse ANY queries (security)
  refuse_any: true
  
  # === UPSTREAM DNS (DNS Server Mandiri) ===
  upstream_dns:
    - 127.0.0.1:5353  # DNS Server Mandiri recursive resolver
  
  # Bootstrap DNS (for resolving AdGuard's own domains)
  bootstrap_dns:
    - 1.1.1.1
    - 8.8.8.8
  
  # No fallback (rely on DNS Server Mandiri)
  fallback_dns: []
  
  # Query all upstreams (not needed, we only have one)
  all_servers: false
  
  # Don't use fastest address (we only have one upstream)
  fastest_addr: false
  fastest_timeout: 1s
  
  # Access control (empty = allow all)
  allowed_clients: []
  disallowed_clients: []
  
  # Block version queries
  blocked_hosts:
    - version.bind
    - id.server
    - hostname.bind
  
  # Trusted proxies
  trusted_proxies:
    - 127.0.0.0/8
    - ::1/128
  
  # === CACHE CONFIGURATION ===
  # Small cache (DNS Server Mandiri has 500K cache)
  cache_size: 100000
  cache_ttl_min: 0      # Use upstream TTL
  cache_ttl_max: 0      # Use upstream TTL
  cache_optimistic: true  # Return stale cache while refreshing
  
  # Bogus NXDOMAIN filtering
  bogus_nxdomain: []
  
  # Don't disable IPv6
  aaaa_disabled: false
  
  # DNSSEC (enable if DNS Server Mandiri has DNSSEC enabled)
  enable_dnssec: false
  
  # === EDNS CLIENT SUBNET ===
  # Let DNS Server Mandiri handle ECS
  edns_client_subnet:
    custom_ip: ""
    enabled: true
    use_custom: false
  
  # Performance
  max_goroutines: 300
  upstream_timeout: 10s
  
  # Handle Discovery of Designated Resolvers
  handle_ddr: true
  
  # Private networks
  use_private_ptr_resolvers: true
  private_networks: []
  local_ptr_upstreams: []
  
  # DNS64 (for IPv6-only networks)
  use_dns64: false
  dns64_prefixes: []
  
  # HTTP/3 support
  serve_http3: false
  use_http3_upstreams: false

# ==================== TLS/HTTPS Configuration ====================
tls:
  enabled: false  # Enable if you want DNS-over-HTTPS/TLS
  server_name: ""
  force_https: false
  port_https: 443
  port_dns_over_tls: 853
  port_dns_over_quic: 853
  port_dnscrypt: 0
  allow_unencrypted_doh: false
  certificate_chain: ""
  private_key: ""
  certificate_path: ""
  private_key_path: ""
  strict_sni_check: false

# ==================== Query Log ====================
querylog:
  ignored: []
  interval: 2160h  # 90 days retention
  size_memory: 1000  # Keep 1000 queries in memory
  enabled: true
  file_enabled: true

# ==================== Statistics ====================
statistics:
  ignored: []
  interval: 24h  # Keep 24 hours of detailed stats
  enabled: true

# ==================== Filters (Blocklists) ====================
filters:
  # AdGuard DNS filter (recommended)
  - enabled: true
    url: https://adguardteam.github.io/AdGuardSDNSFilter/Filters/filter.txt
    name: AdGuard DNS filter
    id: 1
  
  # HaGeZi Pro (comprehensive blocking)
  - enabled: true
    url: https://raw.githubusercontent.com/hagezi/dns-blocklists/main/wildcard/pro-onlydomains.txt
    name: HaGeZi Pro
    id: 2
  
  # OISD Big (alternative comprehensive list)
  # - enabled: true
  #   url: https://big.oisd.nl/domainswild
  #   name: OISD Big
  #   id: 3
  
  # 1Hosts Pro (privacy + ads)
  # - enabled: true
  #   url: https://o0.pages.dev/Pro/adblock.txt
  #   name: 1Hosts Pro
  #   id: 4

# Whitelist filters (domains to never block)
whitelist_filters: []

# Custom user rules
# Example: ||example.com^ (block example.com)
# Example: @@||example.com^ (whitelist example.com)
user_rules: []

# ==================== DHCP Server ====================
dhcp:
  enabled: false  # Enable if you want AdGuard to be DHCP server
  interface_name: ""
  local_domain_name: lan
  dhcpv4:
    gateway_ip: ""
    subnet_mask: ""
    range_start: ""
    range_end: ""
    lease_duration: 86400
    icmp_timeout_msec: 1000
    options: []
  dhcpv6:
    range_start: ""
    lease_duration: 86400
    ra_slaac_only: false
    ra_allow_slaac: false

# ==================== Filtering Settings ====================
filtering:
  # Blocking response (default = NXDOMAIN)
  blocking_ipv4: ""  # Empty = NXDOMAIN, or set to 0.0.0.0
  blocking_ipv6: ""  # Empty = NXDOMAIN, or set to ::
  
  # Blocked services (social media, etc)
  blocked_services:
    schedule:
      time_zone: UTC
    ids: []
  
  # Protection schedule
  protection_disabled_until: null
  
  # Safe Search enforcement
  safe_search:
    enabled: false
    bing: true
    duckduckgo: true
    google: true
    pixabay: true
    yandex: true
    youtube: true
  
  # Blocking mode
  blocking_mode: default  # or "nxdomain", "null_ip", "custom_ip"
  
  # Parental control & safe browsing
  parental_block_host: family-block.dns.adguard.com
  safebrowsing_block_host: standard-block.dns.adguard.com
  
  # DNS rewrites (custom local records)
  # Example:
  # rewrites:
  #   - domain: router.local
  #     answer: 192.168.1.1
  rewrites: []
  
  # Cache sizes
  safebrowsing_cache_size: 1048576
  safesearch_cache_size: 1048576
  parental_cache_size: 1048576
  cache_time: 30
  
  # Filter update interval
  filters_update_interval: 24  # hours
  
  # Blocked response TTL
  blocked_response_ttl: 10
  
  # Enable/disable features
  filtering_enabled: true
  parental_enabled: false
  safebrowsing_enabled: false
  protection_enabled: true

# ==================== Clients ====================
clients:
  # Runtime sources for client identification
  runtime_sources:
    whois: true
    arp: true
    rdns: true
    dhcp: true
    hosts: true
  
  # Persistent clients (manual configuration)
  # Example:
  # persistent:
  #   - name: "John's iPhone"
  #     ids:
  #       - 192.168.1.100
  #     use_global_settings: true
  #     filtering_enabled: true
  #     parental_enabled: false
  #     safebrowsing_enabled: false
  persistent: []

# ==================== Logging ====================
log:
  file: ""  # Empty = stdout (systemd journal)
  max_backups: 0
  max_size: 100
  max_age: 3
  compress: false
  local_time: false
  verbose: false  # Set to true for debugging

# ==================== OS Settings ====================
os:
  group: ""
  user: ""
  rlimit_nofile: 0

# Schema version (don't change)
schema_version: 28
